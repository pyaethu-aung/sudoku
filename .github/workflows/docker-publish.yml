# =============================================================================
# Docker CI/CD Pipeline — Sudoku Web
#
# Triggers:
#   - release published:    Build + Scan + Push to GHCR + Cosign Sign
#   - pull_request to main: Build + Scan (no push)
#   - weekly cron:          Build + Scan for new CVEs (no push)
# =============================================================================

name: Docker

on:
  release:
    types: [published]
  pull_request:
    branches: ["main"]
    paths:
      - '.github/workflows/docker-publish.yml'
      - 'Dockerfile'
      - '.docker/nginx.conf'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig*.json'
      - '.nvmrc'
  schedule:
    - cron: '35 6 * * 0'  # Weekly on Sundays at 06:35 UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      # Required for Cosign keyless signing via Sigstore/Fulcio OIDC
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # --- Dockerfile Linting ---
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      # --- Cosign Setup ---
      # Install Cosign for image signing (skip on PRs — no push occurs)
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.0.5'

      # --- Docker Buildx Setup ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      # --- Registry Login ---
      # Login to GHCR (skip on PRs — no push occurs)
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Image Metadata ---
      # Extract semver tags and SHA for image tagging
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      # --- Build for Scanning ---
      # Build each platform separately so Trivy can scan both before push
      - name: Build linux/amd64 image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/image-amd64.tar
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Vulnerability Scanning — amd64 ---
      # Fail on fixable CRITICAL/HIGH CVEs only (--ignore-unfixed)
      - name: Run Trivy vulnerability scanner (amd64)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/image-amd64.tar
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: .trivyignore

      - name: Build linux/arm64 image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/image-arm64.tar
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Vulnerability Scanning — arm64 ---
      - name: Run Trivy vulnerability scanner (arm64)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/image-arm64.tar
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: .trivyignore

      # --- Build and Push ---
      # Push to GHCR ONLY on semver tag pushes (v*.*.*)
      # Multi-platform: linux/amd64 + linux/arm64
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Image Signing ---
      # Sign with Cosign keyless (Sigstore/Fulcio OIDC) on tag pushes only
      - name: Sign the published Docker image
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
